# Sunny VTuber — copy to project root as config.yaml and edit

audio:
  sample_rate: 16000
  # ~100 ms por bloco + pré-roll: alinhado a demo/speech_recon/speechRecognitionDemo.py
  chunk_ms: 100
  silence_chunks: 10
  max_seconds: 30.0
  # Segundos máximos esperando a primeira fala antes de desistir (evita bloqueio infinito)
  max_wait_for_speech_sec: 120.0
  energy_factor: 1.75
  min_abs_threshold: 0.004
  preroll_chunks: 5
  input_device: null

stt:
  # small ou medium costumam melhorar pt-BR (mais pesado)
  whisper_model: base
  # cpu recomendado no Windows sem CUDA completa; use cuda se tiveres GPU NVIDIA + drivers
  device: cpu
  compute_type: default
  language: pt
  vad_filter: false
  beam_size: 10
  patience: 1.1
  best_of: 5
  repetition_penalty: 1.05
  no_repeat_ngram_size: 0
  condition_on_previous_text: false
  initial_prompt: null
  hotwords: null

llm:
  # ollama | openai_compatible
  provider: ollama
  model: sunny
  # Ollama: opcional (ex. http://127.0.0.1:11434). openai_compatible: obrigatório (ex. https://api.openai.com/v1)
  api_base: null
  # Só openai_compatible; se null, usa env OPENAI_API_KEY
  api_key: null
  system_prompt: null

tts:
  elevenlabs_api_key: YOUR_KEY
  voice_id: YOUR_VOICE_ID
  model_id: eleven_multilingual_v2
  output_format: mp3_44100_128

vtube:
  enabled: false
  ws_url: ws://127.0.0.1:8001
  plugin_name: SunnyApp
  plugin_developer: SunnyApp
  auth_token: ""
  # Opcional: um só hotkey (legado). Preferir talking_hotkey_ids para vários movimentos aleatórios.
  hotkey_talking_id: ""
  talking_hotkey_ids: []
  hotkey_idle_id: ""
  talking_trigger_interval_sec: 0.45
  mouth_parameter_id: null
  mouth_jitter_interval_sec: 0.18

playback:
  prefer_ffplay: false
  # 1.35 = 35% mais rápido; requer ffplay ou mpv no PATH (FFmpeg). Se não houver, toca a 1.0x (MCI).
  playback_speed: 1.35
